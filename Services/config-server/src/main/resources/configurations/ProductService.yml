spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PRODUCT_DB_HOST:localhost}:${DB_PORT:5433}/product_db
    username: ${PRODUCT_POSTGRE_USERNAME}
    password: ${PRODUCT_POSTGRE_PASS}
  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-request-size: 2GB
      max-file-size: 2GB
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:7080/realms/eCommerce-realm/protocol/openid-connect/certs
          issuer-uri: http://localhost:7080/realms/eCommerce-realm


server:
  port: 9020
