
server:
  port: 9010



spring:
  security:
    user:
      password: userpassword1
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${CLIENT_DB_HOST:localhost}:5432/client_db
    username: ${CLIENT_POSTGRE_USERNAME}
    password: ${CLIENT_POSTGRE_PASS}

  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          feignName:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: full
  servlet:
    multipart:
      max-request-size: 2GB
      max-file-size: 2GB



  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9093}
    consumer:
      group-id: user-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: '*'
