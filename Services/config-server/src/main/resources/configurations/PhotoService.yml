server:
  port: 9030

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PHOTO_DB_HOST:localhost}:${DB_PORT:5438}/photo_db
    username: ${PHOTO_POSTGRE_USERNAME}
    password: ${PHOTO_POSTGRE_PASS}
  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
        max-request-size: 2GB
        max-file-size: 2GB



application:
  config:
    client-url: http://localhost:9010/api
    product-url: http://localhost:9020/api

photo:
  path: ${PHOTO_PATH}